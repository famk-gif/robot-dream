<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .box { fill: #ffffff; stroke: #2b3a4b; stroke-width: 2; rx: 14; }
      .title { font: 22px 'Segoe UI', Arial, sans-serif; fill: #1b2533; font-weight: 700; }
      .label { font: 14px 'Segoe UI', Arial, sans-serif; fill: #1b2533; }
      .small { font: 12px 'Segoe UI', Arial, sans-serif; fill: #42566b; }
      .hint { font: 13px 'Segoe UI', Arial, sans-serif; fill: #42566b; }
    </style>
  </defs>
  <rect x="0" y="0" width="1200" height="720" class="bg" />
  <rect x="40" y="40" width="1120" height="640" class="box" />
  <text x="70" y="90" class="title">步骤 3：底盘上盖</text>
  <text x="70" y="120" class="hint">整理电源主干线后，扣上上盖但先别完全封死。</text>
    <rect x="120" y="220" width="420" height="160" class="box" />
  <rect x="150" y="250" width="360" height="100" fill="#e9eef6" stroke="#2b3a4b" stroke-width="2" />
  <text x="170" y="280" class="label">上盖</text>
  <text x="170" y="310" class="small">预留走线</text>
</svg>
