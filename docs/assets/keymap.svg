<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <style>
      .title { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #1b2533; }
      .label { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #1b2533; }
      .key { fill: #f2f5f9; stroke: #c7d0db; stroke-width: 2; rx: 10; ry: 10; }
      .keytext { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #1b2533; }
      .note { font: 12px 'Segoe UI', Arial, sans-serif; fill: #42566b; }
      .group { fill: #ffffff; stroke: #e2e7ef; stroke-width: 2; rx: 14; ry: 14; }
    </style>
  </defs>

  <rect x="20" y="20" width="860" height="480" class="group" />
  <text x="40" y="55" class="title">键位图（舵机 + 底盘）</text>

  <rect x="40" y="80" width="390" height="260" class="group" />
  <text x="60" y="115" class="label">舵机控制（按住移动，松开即停）</text>

  <rect x="70" y="140" width="70" height="60" class="key" />
  <text x="100" y="177" class="keytext" text-anchor="middle">Q</text>
  <text x="70" y="215" class="note">左夹爪</text>

  <rect x="160" y="140" width="70" height="60" class="key" />
  <text x="195" y="177" class="keytext" text-anchor="middle">E</text>
  <text x="160" y="215" class="note">右夹爪</text>

  <rect x="70" y="220" width="70" height="60" class="key" />
  <text x="100" y="257" class="keytext" text-anchor="middle">A</text>
  <text x="70" y="295" class="note">左肩</text>

  <rect x="160" y="220" width="70" height="60" class="key" />
  <text x="195" y="257" class="keytext" text-anchor="middle">D</text>
  <text x="160" y="295" class="note">右肩</text>

  <rect x="70" y="300" width="70" height="60" class="key" />
  <text x="100" y="337" class="keytext" text-anchor="middle">Z</text>
  <text x="70" y="375" class="note">左肘</text>

  <rect x="160" y="300" width="70" height="60" class="key" />
  <text x="195" y="337" class="keytext" text-anchor="middle">C</text>
  <text x="160" y="375" class="note">右肘</text>

  <rect x="470" y="80" width="390" height="260" class="group" />
  <text x="490" y="115" class="label">底盘控制（方向键）</text>

  <rect x="620" y="140" width="70" height="60" class="key" />
  <text x="655" y="177" class="keytext" text-anchor="middle">↑</text>
  <text x="615" y="215" class="note">前进</text>

  <rect x="550" y="220" width="70" height="60" class="key" />
  <text x="585" y="257" class="keytext" text-anchor="middle">←</text>
  <text x="548" y="295" class="note">左转</text>

  <rect x="620" y="220" width="70" height="60" class="key" />
  <text x="655" y="257" class="keytext" text-anchor="middle">↓</text>
  <text x="615" y="295" class="note">后退</text>

  <rect x="690" y="220" width="70" height="60" class="key" />
  <text x="725" y="257" class="keytext" text-anchor="middle">→</text>
  <text x="690" y="295" class="note">右转</text>

  <rect x="40" y="360" width="820" height="120" class="group" />
  <text x="60" y="395" class="label">其它控制</text>

  <rect x="70" y="410" width="70" height="60" class="key" />
  <text x="105" y="447" class="keytext" text-anchor="middle">H</text>
  <text x="70" y="485" class="note">挥手</text>

  <rect x="160" y="410" width="70" height="60" class="key" />
  <text x="195" y="447" class="keytext" text-anchor="middle">R</text>
  <text x="160" y="485" class="note">复位</text>

  <rect x="250" y="410" width="70" height="60" class="key" />
  <text x="285" y="447" class="keytext" text-anchor="middle">S</text>
  <text x="250" y="485" class="note">停止动作</text>

  <rect x="340" y="410" width="70" height="60" class="key" />
  <text x="375" y="447" class="keytext" text-anchor="middle">X</text>
  <text x="340" y="485" class="note">底盘停止</text>

  <text x="540" y="455" class="note">ESC 退出脚本</text>
</svg>
